<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassKeys Config</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #1e1e1e;
            color: #eee;
            margin: 0;
            padding: 15px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        h3 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 10px 0;
            color: #bbb;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex: 1;
            min-height: 0; 
        }
        .panel {
            background: #252526;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #333;
        }
        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85em;
            font-weight: 500;
            cursor: pointer;
            color: #ddd;
        }
        select {
            padding: 4px 8px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.85em;
            width: 100%;
            background-color: #333;
            color: white;
            cursor: pointer;
        }
        .slider-container {
            margin-top: 5px;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            margin: 10px 0;
            cursor: pointer;
            background: #444;
        }
        .binds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 12px;
        }
        .bind-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            border: 1px solid #444;
        }
        button.port-btn {
            background: #444;
            border: 1px solid #555;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            color: #eee;
            width: auto;
            min-width: 40px;
        }
        button.port-btn:hover { border-color: #777; background: #555; }
        button.rebind-btn {
            background: #444;
            border: 1px solid #555;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            color: #eee;
            min-width: 40px;
            transition: all 0.1s;
        }
        button.rebind-btn:hover { border-color: #777; background: #555; }
        button.rebind-btn.recording {
            background: #d32f2f;
            color: white;
            border-color: #b71c1c;
        }
        .colors-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .color-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8em;
            color: #ccc;
        }
        input[type="color"] {
            border: 1px solid #555;
            width: 24px;
            height: 24px;
            padding: 0;
            background: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .footer {
            margin-top: 15px;
        }
        .close-btn {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .close-btn:hover { background: #106ebe; }
        .col-left { display: flex; flex-direction: column; gap: 15px; }
        .col-right { display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="col-left">
            <div class="panel">
                <h3>Layout Options</h3>
                <label>
                    Hide Binds (+L/+R)
                    <input type="checkbox" id="hide-binds">
                </label>
                <label>
                    Hide Jump & Crouch
                    <input type="checkbox" id="hide-jump-crouch">
                </label>
                <label>
                    Use Arrows for +L/+R
                    <input type="checkbox" id="arrows-mouse">
                </label>
                <label>
                    Flip Turn Binds (+L/+R)
                    <input type="checkbox" id="flip-turn-binds">
                </label>
            </div>
            <div class="panel">
                 <h3>Window Settings</h3>
                 <label>
                    Always on Top
                    <input type="checkbox" id="always-on-top">
                </label>
                <div class="slider-container">
                    <label style="margin-bottom: 4px;">Window Scale <span id="scale-val" style="color:#2196f3">1.0x</span></label>
                    <input type="range" id="window-scale" min="0.5" max="2.0" step="0.1" value="1.0" style="margin: 5px 0;">
                </div>
            </div>
            <div class="panel" style="flex: 1;">
                <h3>Key Bindings</h3>
                <div class="binds-grid">
                    <div class="bind-item"><span>Forward</span> <button class="rebind-btn" data-action="W">W</button></div>
                    <div class="bind-item"><span>Left</span> <button class="rebind-btn" data-action="A">A</button></div>
                    <div class="bind-item"><span>Back</span> <button class="rebind-btn" data-action="S">S</button></div>
                    <div class="bind-item"><span>Right</span> <button class="rebind-btn" data-action="D">D</button></div>
                    <div class="bind-item"><span>Crouch</span> <button class="rebind-btn" data-action="TAB">TAB</button></div>
                    <div class="bind-item"><span>Jump</span> <button class="rebind-btn" data-action="SPACE">SPC</button></div>
                    <div class="bind-item"><span>Turn Left (+L)</span> <button class="rebind-btn" data-action="MOUSE1">M1</button></div>
                    <div class="bind-item"><span>Turn Right (+R)</span> <button class="rebind-btn" data-action="MOUSE2">M2</button></div>
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="panel" style="flex: 1;">
                <h3>Style & Theme</h3>
                <div style="margin-bottom: 10px;">
                    <label style="margin-bottom: 4px;">Preset Theme</label>
                    <select id="theme-preset">
                        <option value="custom">Custom</option>
                        <option value="glass">Glass (Default)</option>
                        <option value="dark">Minimal Dark</option>
                        <option value="cyber">Cyberpunk</option>
                        <option value="retro">Retro Terminal</option>
                        <option value="clean">Clean White</option>
                    </select>
                </div>
                <div style="margin-bottom: 10px;">
                    <label style="margin-bottom: 4px;">Font Family</label>
                    <select id="font-family">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Roboto Mono', monospace">Roboto Mono</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                        <option value="'Courier New', monospace">Courier New</option>
                        <option value="Arial, sans-serif">Arial</option>
                    </select>
                </div>
                <div class="slider-container" style="margin-bottom: 10px;">
                    <label style="margin-bottom: 4px;">Overlay Opacity <span id="opacity-val" style="color:#2196f3">100%</span></label>
                    <input type="range" id="opacity" min="0" max="100" value="100" style="margin: 5px 0;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label style="margin-bottom: 4px;">Theme Colors</label>
                        <div class="colors-grid">
                        <div class="color-item">Idle BG <input type="color" id="bg-idle" value="#000000"></div>
                        <div class="color-item">Active BG <input type="color" id="bg-active" value="#ffffff"></div>
                        <div class="color-item">Idle Border <input type="color" id="border-idle" value="#ffffff"></div>
                        <div class="color-item">Active Border <input type="color" id="border-active" value="#ffffff"></div>
                        <div class="color-item">Idle Text <input type="color" id="text-idle" value="#ffffff"></div>
                        <div class="color-item">Active Text <input type="color" id="text-active" value="#000000"></div>
                        <div class="color-item" style="grid-column: span 2;">Active Glow <input type="color" id="glow-active" value="#ffffff"></div>
            </div>
        </div>
    </div>
            <div class="panel">
                <h3>OBS Setup</h3>
                <div style="font-size: 0.85em; color: #ccc; line-height: 1.4;">
                    <div style="margin-bottom: 10px;">
                        <label style="margin-bottom: 4px;">Server Port</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="number" id="server-port" value="3001" style="width: 60px; padding: 4px; background: #333; border: 1px solid #444; color: white; border-radius: 4px;">
                            <button id="set-port-btn" class="port-btn">Set</button>
                        </div>
                        <div style="font-size: 0.9em; color: #888; margin-top: 4px;">Changing port restarts server.</div>
                    </div>
                    
                    <div style="margin-bottom: 8px;">Add a <strong>Browser</strong> source:</div>
                    <div id="obs-url-display" style="background: #111; padding: 6px; border: 1px solid #333; border-radius: 4px; font-family: 'Roboto Mono', monospace; margin-bottom: 8px; user-select: all; cursor: text; color: #4caf50;">http://localhost:3001</div>
                </div>
            </div>
    <script>
        const { ipcRenderer } = require('electron');
        ipcRenderer.send('get-current-config');
        const opacity = document.getElementById('opacity');
        const opacityVal = document.getElementById('opacity-val');
        const hideBinds = document.getElementById('hide-binds');
        const hideJumpCrouch = document.getElementById('hide-jump-crouch');
        const arrowsMouse = document.getElementById('arrows-mouse');
        const flipTurnBinds = document.getElementById('flip-turn-binds');
        const alwaysOnTop = document.getElementById('always-on-top');
        const windowScale = document.getElementById('window-scale');
        const scaleVal = document.getElementById('scale-val');
        const serverPort = document.getElementById('server-port');
        const setPortBtn = document.getElementById('set-port-btn');
        const obsUrlDisplay = document.getElementById('obs-url-display');
        const themePreset = document.getElementById('theme-preset');
        const fontFamily = document.getElementById('font-family');
        const colors = {
            bgIdle: document.getElementById('bg-idle'),
            borderIdle: document.getElementById('border-idle'),
            textIdle: document.getElementById('text-idle'),
            bgActive: document.getElementById('bg-active'),
            borderActive: document.getElementById('border-active'),
            textActive: document.getElementById('text-active'),
            glowActive: document.getElementById('glow-active')
        };
        const PRESETS = {
            glass: {
                bgIdle: "rgba(0, 0, 0, 0.15)",
                borderIdle: "rgba(255, 255, 255, 0.6)",
                textIdle: "rgba(255, 255, 255, 0.6)",
                bgActive: "rgba(255, 255, 255, 0.8)",
                borderActive: "rgba(255, 255, 255, 1)",
                textActive: "#000000",
                glowActive: "rgba(255, 255, 255, 0.5)",
                fontFamily: "'Inter', sans-serif"
            },
            dark: {
                bgIdle: "#1a1a1a",
                borderIdle: "#333333",
                textIdle: "#888888",
                bgActive: "#ffffff",
                borderActive: "#ffffff",
                textActive: "#000000",
                glowActive: "rgba(255, 255, 255, 0.2)",
                fontFamily: "'Roboto Mono', monospace"
            },
            cyber: {
                bgIdle: "rgba(0, 0, 20, 0.8)",
                borderIdle: "#00ffea",
                textIdle: "#00ffea",
                bgActive: "#00ffea",
                borderActive: "#ff00ff",
                textActive: "#000000",
                glowActive: "#00ffea",
                fontFamily: "'Courier New', monospace"
            },
            retro: {
                bgIdle: "#000000",
                borderIdle: "#00ff00",
                textIdle: "#00ff00",
                bgActive: "#00ff00",
                borderActive: "#00ff00",
                textActive: "#000000",
                glowActive: "#00ff00",
                fontFamily: "'Courier New', monospace"
            },
            clean: {
                bgIdle: "#ffffff",
                borderIdle: "#e0e0e0",
                textIdle: "#333333",
                bgActive: "#333333",
                borderActive: "#000000",
                textActive: "#ffffff",
                glowActive: "rgba(0,0,0,0.1)",
                fontFamily: "Arial, sans-serif"
            }
        };
        let customThemeCache = {};

        function colorToHex(color) {
            if (!color) return '#000000';
            if (color.startsWith('#')) return color.substring(0, 7); 
            if (color.startsWith('rgb')) {
                const match = color.match(/(\d+(\.\d+)?)/g);
                if (match && match.length >= 3) {
                    const r = parseInt(match[0]);
                    const g = parseInt(match[1]);
                    const b = parseInt(match[2]);
                    const toHex = c => { const h = c.toString(16); return h.length===1?'0'+h:h; };
                    return "#" + toHex(r) + toHex(g) + toHex(b);
                }
            }
            return '#000000'; 
        }
        function sendThemeUpdate() {
            const theme = {
                fontFamily: fontFamily.value,
                bgIdle: colors.bgIdle.value, 
                borderIdle: colors.borderIdle.value,
                textIdle: colors.textIdle.value,
                bgActive: colors.bgActive.value,
                borderActive: colors.borderActive.value,
                textActive: colors.textActive.value,
                glowActive: colors.glowActive.value
            };
            
            // Save manual changes to custom cache
            customThemeCache = { ...theme };
            
            ipcRenderer.send('set-theme', theme);
            themePreset.value = 'custom'; 
        }

        function applyThemeToUI(theme) {
            fontFamily.value = theme.fontFamily;
            colors.bgIdle.value = colorToHex(theme.bgIdle);
            colors.borderIdle.value = colorToHex(theme.borderIdle);
            colors.textIdle.value = colorToHex(theme.textIdle);
            colors.bgActive.value = colorToHex(theme.bgActive);
            colors.borderActive.value = colorToHex(theme.borderActive);
            colors.textActive.value = colorToHex(theme.textActive);
            colors.glowActive.value = colorToHex(theme.glowActive);
        }

        Object.values(colors).forEach(input => input.addEventListener('input', sendThemeUpdate));
        fontFamily.addEventListener('change', sendThemeUpdate);

        themePreset.addEventListener('change', (e) => {
            if (e.target.value === 'custom') {
                if (Object.keys(customThemeCache).length > 0) {
                    applyThemeToUI(customThemeCache);
                    ipcRenderer.send('set-theme', customThemeCache);
                }
            } else {
                const preset = PRESETS[e.target.value];
                if (preset) {
                    applyThemeToUI(preset);
                    ipcRenderer.send('set-theme', preset);
                }
            }
        });
        opacity.addEventListener('input', (e) => {
            opacityVal.innerText = e.target.value + '%';
            ipcRenderer.send('set-opacity', e.target.value);
        });
        hideBinds.addEventListener('change', (e) => ipcRenderer.send('set-hide-binds', e.target.checked));
        hideJumpCrouch.addEventListener('change', (e) => ipcRenderer.send('set-hide-jump-crouch', e.target.checked));
        arrowsMouse.addEventListener('change', (e) => ipcRenderer.send('set-arrows-mouse', e.target.checked));
        flipTurnBinds.addEventListener('change', (e) => ipcRenderer.send('set-flip-turn-binds', e.target.checked));
        alwaysOnTop.addEventListener('change', (e) => {
            ipcRenderer.send('set-always-on-top', e.target.checked);
            ipcRenderer.send('set-always-on-top-main', e.target.checked);
        });
        windowScale.addEventListener('input', (e) => {
            scaleVal.innerText = e.target.value + 'x';
            ipcRenderer.send('set-window-scale', e.target.value);
        });
        setPortBtn.addEventListener('click', () => {
            ipcRenderer.send('set-port', serverPort.value);
            const originalText = setPortBtn.innerText;
            setPortBtn.innerText = "Saved";
            setPortBtn.style.color = "#4caf50";
            setPortBtn.disabled = true;
            
            // Update URL display
            obsUrlDisplay.innerText = `http://localhost:${serverPort.value}`;
            
            setTimeout(() => {
                setPortBtn.innerText = originalText;
                setPortBtn.style.color = "";
                setPortBtn.disabled = false;
            }, 1000);
        });
        const rebindBtns = document.querySelectorAll('.rebind-btn');
        let currentRebindBtn = null;
        rebindBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.blur();
                if (currentRebindBtn) {
                    currentRebindBtn.classList.remove('recording');
                    currentRebindBtn.innerText = currentRebindBtn.dataset.key || currentRebindBtn.dataset.action; 
                }
                currentRebindBtn = btn;
                btn.classList.add('recording');
                btn.innerText = '...';
                ipcRenderer.send('start-recording', btn.dataset.action);
            });
        });
        ipcRenderer.on('current-config', (event, config) => {
            opacity.value = config.opacity;
            opacityVal.innerText = config.opacity + '%';
            hideBinds.checked = config.hideBinds;
            hideJumpCrouch.checked = config.hideJumpCrouch;
            arrowsMouse.checked = config.arrowsForMouse;
            flipTurnBinds.checked = config.flipTurnBinds || false;
            alwaysOnTop.checked = config.alwaysOnTop || false;
            if (config.windowScale) {
                windowScale.value = config.windowScale;
                scaleVal.innerText = config.windowScale + 'x';
            }
            if (config.port) {
                serverPort.value = config.port;
                obsUrlDisplay.innerText = `http://localhost:${config.port}`;
            }
            if (config.theme) {
                applyThemeToUI(config.theme);
                
                // If the config theme doesn't match a preset, it's custom.
                // But we don't want to overwrite custom cache with "glass" default if it's fresh.
                // Simple heuristic: always update custom cache with incoming config if it's the first load
                if (Object.keys(customThemeCache).length === 0) {
                    customThemeCache = { ...config.theme };
                }
            }
        });
        ipcRenderer.on('binding-recorded', (event, data) => {
            if (currentRebindBtn && currentRebindBtn.dataset.action === data.action) {
                let display = data.keyName;
                if(display === 'Space') display = 'SPC';
                if(data.type === 'mouse') display = 'M' + data.button;
                
                currentRebindBtn.innerText = display; 
                currentRebindBtn.dataset.key = display; 
                currentRebindBtn.classList.remove('recording');
                currentRebindBtn = null;
            }
        });
    </script>
</body>
</html>
