<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassKeys Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay-container">
        <!-- Top Row: TAB, +L, W, +R -->
        <div class="key-row">
            <div class="key" id="key-TAB">CROUCH</div>
            <div class="key" id="key-MOUSE1">+L</div> <!-- Left Click -->
            <div class="key" id="key-W">W</div>
            <div class="key" id="key-MOUSE2">+R</div> <!-- Right Click -->
        </div>
        <!-- Bottom Row: SPACE, A, S, D -->
        <div class="key-row">
            <div class="key wide" id="key-SPACE">JUMP</div>
            <div class="key" id="key-A">A</div>
            <div class="key" id="key-S">S</div>
            <div class="key" id="key-D">D</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
